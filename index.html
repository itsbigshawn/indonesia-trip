<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You, me + Indonesia?</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Playfair+Display:wght@500;600;700&family=Poppins:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --accent: #d2604e;        /* coral / terracotta */
      --accent-dark: #b94c3b;
      --accent-soft: #f3ddc9;   /* warm clay tint */
      --bg: #f9f4c8;            /* butter cream */
      --surface: #fffdf0;       /* pale cream cards */
      --ink: #463a34;          /* warm dark brown */
      --muted: #948776;        /* muted secondary text */
      --line: #ece2bf;         /* cream hairline */
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Merriweather", Georgia, serif;
      line-height: 1.85;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    header {
      text-align: center;
      padding: 38px 16px 30px;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      position: relative;
      z-index: 500;
    }

    .flower {
      width: 34px;
      height: 34px;
      margin: 0 auto 14px;
      color: var(--accent);
      display: block;
    }

    .eyebrow {
      font-family: "Poppins", system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      margin: 0 0 12px;
    }

    header h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 600;
      letter-spacing: 0.005em;
      line-height: 1.1;
      font-size: clamp(2.1rem, 5.5vw, 3.6rem);
      margin: 0;
      color: var(--accent);
      display: inline-block;
      border-bottom: 3px solid var(--accent);
      padding-bottom: 6px;
    }

    header p {
      margin: 18px auto 0;
      max-width: 580px;
      font-size: clamp(0.9rem, 2.2vw, 1.02rem);
      color: var(--ink);
      line-height: 1.75;
    }

    .layout {
      display: flex;
      height: calc(100vh - 168px);
      min-height: 420px;
    }

    #map {
      flex: 1 1 auto;
      height: 100%;
      background: #efe9cf;
    }

    aside {
      flex: 0 0 360px;
      max-width: 64%;
      overflow-y: auto;
      padding: 28px 26px 52px;
      background: var(--bg);
      border-left: 1px solid var(--line);
    }

    aside h2 {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 600;
      letter-spacing: 0.005em;
      color: var(--accent);
      font-size: 1.5rem;
      line-height: 1.3;
      margin: 2px 0 20px;
    }

    .stop-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .stop-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(70, 58, 52, 0.12);
    }

    .stop-card h3 {
      font-family: "Poppins", system-ui, sans-serif;
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      line-height: 1.3;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge {
      background: var(--accent);
      color: #fffdf0;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: "Poppins", system-ui, sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      flex: 0 0 auto;
    }

    .nights {
      font-family: "Poppins", system-ui, sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--accent);
      margin-left: auto;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .stop-card ul {
      margin: 14px 0 0;
      padding-left: 18px;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #5a4d44;
    }

    .stop-card li { margin-bottom: 3px; }

    .marker-pin {
      background: var(--accent);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(70, 58, 52, 0.3);
      border: 2.5px solid #fffdf0;
    }

    .marker-pin span {
      transform: rotate(45deg);
      font-family: "Poppins", system-ui, sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 12px 34px rgba(70, 58, 52, 0.2);
    }

    .leaflet-popup-content {
      font-family: "Merriweather", Georgia, serif;
      margin: 16px 18px;
      color: var(--ink);
      line-height: 1.7;
    }

    .popup-title {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 600;
      font-size: 1.15rem;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .popup-title .pop-nights {
      color: var(--accent-dark);
      font-family: "Poppins", system-ui, sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .popup-content em { color: var(--muted); font-style: italic; }

    .popup-content ul {
      margin: 10px 0 0;
      padding-left: 18px;
      line-height: 1.6;
      color: #5a4d44;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      font-size: 0.78rem;
      font-family: "Poppins", system-ui, sans-serif;
      letter-spacing: 0.04em;
      padding: 16px;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .layout { flex-direction: column; height: auto; }
      #map { height: 55vh; }
      aside { flex: none; max-width: 100%; border-left: none; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <header>
    <svg class="flower" viewBox="0 0 100 100" aria-hidden="true" fill="currentColor">
      <path d="M50 6c4 0 7 9 7 20 0 4-1 8-2 11 3-2 6-3 9-3 9-3 18-1 19 3s-6 11-15 14c-3 1-7 1-11 1 3 2 5 5 7 8 6 8 8 17 4 19s-12-3-18-11c-2-3-4-7-5-10-1 3-3 7-5 10-6 8-14 13-18 11s-2-11 4-19c2-3 4-6 7-8-4 0-8 0-11-1-9-3-16-10-15-14s10-6 19-3c3 1 6 1 9 3-1-3-2-7-2-11 0-11 3-20 7-20z"/>
    </svg>
    <p class="eyebrow">Bali · Java · Flores</p>
    <h1>You, me + Indonesia?</h1>
    <p>A 14-night girls' trip across four unforgettable stops — temples and rice terraces, dragons and manta rays, batik and big-city eats. Tap a marker to start dreaming.</p>
  </header>

  <div class="layout">
    <div id="map"></div>
    <aside>
      <h2>The itinerary</h2>
      <div id="cards"></div>
    </aside>
  </div>

  <footer>Bali → Flores → Jogjakarta → Jakarta · made with Leaflet &amp; OpenStreetMap</footer>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const stops = [
      {
        n: 1,
        name: "Bali",
        emoji: "🌺",
        nights: 4,
        coords: [-8.4095, 115.1889],
        blurb: "Where the trip kicks off in full island-goddess mode.",
        items: [
          "Ubud: temples, rice terraces & traditional dance performances",
          "Kintamani: Mount Batur + dreamy highlands",
          "Sanur: beach vibes, maxin' relaxin' & seafood feasts"
        ]
      },
      {
        n: 2,
        name: "Flores (Labuan Bajo)",
        emoji: "🐉",
        nights: 4,
        coords: [-8.4960, 119.8877],
        blurb: "Base in Labuan Bajo for the wildest adventure leg.",
        items: [
          "1-night liveaboard 🛥️",
          "Komodo Island, Pink Beach & island hopping",
          "Padar Island sunrise/sunset 🌅",
          "Snorkeling with manta rays 🐠"
        ]
      },
      {
        n: 3,
        name: "Jogjakarta",
        emoji: "🛕",
        nights: 3,
        coords: [-7.7956, 110.3695],
        blurb: "Culture, temples & treasure-hunting central.",
        items: [
          "Borobudur & Prambanan Temples",
          "Museum hopping",
          "Batik workshop 🎨",
          "Shopping in Malioboro 🛍️"
        ]
      },
      {
        n: 4,
        name: "Jakarta",
        emoji: "🏙️",
        nights: 3,
        coords: [-6.2088, 106.8456],
        blurb: "The big-city grand finale.",
        items: [
          "Chaotic city-life vibes",
          "Old Town & Glodok Chinatown",
          "Food, food, food 🍜",
          "Shopping & café hopping ☕"
        ]
      }
    ];

    const map = L.map("map", { scrollWheelZoom: true });

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map);

    const markers = [];

    function popupHtml(s) {
      return (
        '<div class="popup-title">' + s.emoji + " " + s.n + ". " + s.name +
        ' <span class="pop-nights">(' + s.nights + " nights)</span></div>" +
        '<div class="popup-content"><em>' + s.blurb + "</em><ul>" +
        s.items.map(function (i) { return "<li>" + i + "</li>"; }).join("") +
        "</ul></div>"
      );
    }

    stops.forEach(function (s) {
      const icon = L.divIcon({
        className: "",
        html: '<div class="marker-pin"><span>' + s.n + "</span></div>",
        iconSize: [34, 34],
        iconAnchor: [17, 34],
        popupAnchor: [0, -32]
      });

      const m = L.marker(s.coords, { icon: icon })
        .addTo(map)
        .bindPopup(popupHtml(s), { maxWidth: 280 });
      markers.push(m);
    });

    // Route line connecting the stops in order
    L.polyline(stops.map(function (s) { return s.coords; }), {
      color: "#d2604e",
      weight: 3,
      opacity: 0.9,
      dashArray: "6, 9",
      lineJoin: "round"
    }).addTo(map);

    map.fitBounds(L.latLngBounds(stops.map(function (s) { return s.coords; })).pad(0.25));

    // Sidebar cards
    const cards = document.getElementById("cards");
    stops.forEach(function (s, idx) {
      const card = document.createElement("div");
      card.className = "stop-card";
      card.innerHTML =
        '<h3><span class="badge">' + s.n + "</span>" + s.emoji + " " + s.name +
        '<span class="nights">' + s.nights + " nights</span></h3>" +
        "<ul>" + s.items.map(function (i) { return "<li>" + i + "</li>"; }).join("") + "</ul>";
      card.addEventListener("click", function () {
        map.flyTo(s.coords, 9, { duration: 0.8 });
        markers[idx].openPopup();
      });
      cards.appendChild(card);
    });
  </script>
</body>
</html>
